<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1600" font-family="-apple-system, Helvetica, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #212529; }
      .subtitle { font-size: 13px; fill: #495057; }
      .phase { font-size: 16px; font-weight: 600; fill: #343a40; }
      .node-text { font-size: 13px; font-weight: 600; fill: #fff; text-anchor: middle; }
      .node-text-dark { font-size: 13px; font-weight: 600; fill: #212529; text-anchor: middle; }
      .small { font-size: 11px; fill: #fff; text-anchor: middle; }
      .small-dark { font-size: 11px; fill: #495057; text-anchor: middle; }
      .edge { stroke: #495057; stroke-width: 2; fill: none; }
      .edge-dash { stroke: #868e96; stroke-width: 1.5; stroke-dasharray: 6 4; fill: none; }
      .edge-thick { stroke: #c92a2a; stroke-width: 3; fill: none; }
      .phase-bg { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="38" class="title" text-anchor="middle">Explorer → Planner → Executor → Verifier</text>
  <text x="700" y="58" class="subtitle" text-anchor="middle">Parallelized Generator–Verifier pipeline with spec_gate.sh as the hard, non-bypassable gate</text>
  <text x="700" y="75" class="subtitle" text-anchor="middle">Task #264 · sadie · 2026-04-10</text>

  <!-- User/Boss -->
  <ellipse cx="700" cy="120" rx="110" ry="28" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="700" y="126" class="node-text-dark">Boss / User</text>

  <!-- /harness -->
  <rect x="600" y="170" width="200" height="44" rx="6" fill="#fff" stroke="#343a40" stroke-width="2"/>
  <text x="700" y="197" class="node-text-dark">/harness &lt;goal&gt;</text>
  <line x1="700" y1="150" x2="700" y2="168" class="edge" marker-end="url(#arrow)"/>

  <!-- PHASE 1: EXPLORE -->
  <rect x="100" y="240" width="1200" height="130" rx="8" class="phase-bg"/>
  <text x="130" y="265" class="phase">PHASE 1 — EXPLORE (parallel, read-only)</text>
  <g>
    <rect x="180" y="285" width="180" height="64" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="270" y="310" class="node-text">Explorer 1</text>
    <text x="270" y="330" class="small">Sonnet 4.6 · Read/Glob/Grep</text>

    <rect x="410" y="285" width="180" height="64" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="500" y="310" class="node-text">Explorer 2</text>
    <text x="500" y="330" class="small">Sonnet 4.6 · Read/Glob/Grep</text>

    <rect x="640" y="285" width="180" height="64" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="730" y="310" class="node-text">Explorer 3</text>
    <text x="730" y="330" class="small">Sonnet 4.6 · Read/Glob/Grep</text>

    <rect x="870" y="285" width="180" height="64" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="960" y="310" class="node-text">Explorer 4</text>
    <text x="960" y="330" class="small">Sonnet 4.6 · Read/Glob/Grep</text>
  </g>
  <line x1="700" y1="214" x2="270" y2="283" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="214" x2="500" y2="283" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="214" x2="730" y2="283" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="214" x2="960" y2="283" class="edge" marker-end="url(#arrow)"/>

  <!-- exploration/ output folder -->
  <rect x="540" y="400" width="320" height="44" rx="4" fill="#fff3bf" stroke="#f08c00" stroke-width="2"/>
  <text x="700" y="420" class="node-text-dark">exploration/*.md + done.txt</text>
  <text x="700" y="436" class="small-dark">file-based handoff (400 words cap per explorer)</text>
  <line x1="270" y1="349" x2="650" y2="398" class="edge" marker-end="url(#arrow)"/>
  <line x1="500" y1="349" x2="680" y2="398" class="edge" marker-end="url(#arrow)"/>
  <line x1="730" y1="349" x2="720" y2="398" class="edge" marker-end="url(#arrow)"/>
  <line x1="960" y1="349" x2="750" y2="398" class="edge" marker-end="url(#arrow)"/>

  <!-- PHASE 2: PLAN -->
  <rect x="100" y="470" width="1200" height="140" rx="8" class="phase-bg"/>
  <text x="130" y="495" class="phase">PHASE 2 — PLAN (single Opus)</text>

  <rect x="540" y="515" width="320" height="64" rx="8" fill="#845ef7" stroke="#5f3dc4" stroke-width="2"/>
  <text x="700" y="540" class="node-text">Planner</text>
  <text x="700" y="560" class="small">Opus · reads exploration, emits contract</text>
  <line x1="700" y1="444" x2="700" y2="513" class="edge" marker-end="url(#arrow)"/>

  <!-- contract.json -->
  <rect x="540" y="610" width="320" height="44" rx="22" fill="#e9ecef" stroke="#212529" stroke-width="2"/>
  <text x="700" y="636" class="node-text-dark">contract.json (unsigned)</text>
  <line x1="700" y1="579" x2="700" y2="608" class="edge" marker-end="url(#arrow)"/>

  <!-- GATE 1: contract-sign -->
  <polygon points="540,690 860,690 820,742 580,742" fill="#ffa94d" stroke="#d9480f" stroke-width="2"/>
  <text x="700" y="715" class="node-text-dark">spec_gate.sh contract-sign</text>
  <text x="700" y="731" class="small-dark">SHA-256 canonical, overlap check, AC >= 3/lane</text>
  <line x1="700" y1="654" x2="700" y2="688" class="edge" marker-end="url(#arrow)"/>

  <!-- signed contract -->
  <rect x="540" y="770" width="320" height="44" rx="22" fill="#d0ebff" stroke="#1864ab" stroke-width="2"/>
  <text x="700" y="796" class="node-text-dark">contract.json (signed)</text>
  <line x1="700" y1="742" x2="700" y2="768" class="edge" marker-end="url(#arrow)"/>

  <!-- PHASE 3: IMPLEMENT -->
  <rect x="100" y="840" width="1200" height="160" rx="8" class="phase-bg"/>
  <text x="130" y="865" class="phase">PHASE 3 — IMPLEMENT (parallel lanes, write-scoped)</text>
  <g>
    <rect x="180" y="885" width="200" height="70" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="280" y="910" class="node-text">Executor lane-1</text>
    <text x="280" y="928" class="small">Sonnet 4.6</text>
    <text x="280" y="944" class="small">allowed_paths scoped</text>

    <rect x="430" y="885" width="200" height="70" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="530" y="910" class="node-text">Executor lane-2</text>
    <text x="530" y="928" class="small">Sonnet 4.6</text>
    <text x="530" y="944" class="small">allowed_paths scoped</text>

    <rect x="680" y="885" width="200" height="70" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="780" y="910" class="node-text">Executor lane-3</text>
    <text x="780" y="928" class="small">Sonnet 4.6</text>
    <text x="780" y="944" class="small">allowed_paths scoped</text>

    <rect x="930" y="885" width="200" height="70" rx="8" fill="#4dabf7" stroke="#1864ab" stroke-width="2"/>
    <text x="1030" y="910" class="node-text">Executor lane-N</text>
    <text x="1030" y="928" class="small">Sonnet 4.6</text>
    <text x="1030" y="944" class="small">allowed_paths scoped</text>
  </g>
  <line x1="700" y1="814" x2="280" y2="883" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="814" x2="530" y2="883" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="814" x2="780" y2="883" class="edge" marker-end="url(#arrow)"/>
  <line x1="700" y1="814" x2="1030" y2="883" class="edge" marker-end="url(#arrow)"/>

  <!-- GATE 2: lane-scope -->
  <polygon points="540,1020 860,1020 820,1072 580,1072" fill="#ffa94d" stroke="#d9480f" stroke-width="2"/>
  <text x="700" y="1045" class="node-text-dark">spec_gate.sh lane-scope (per lane)</text>
  <text x="700" y="1061" class="small-dark">git diff vs HEAD~1 must stay in allowed_paths</text>
  <line x1="280" y1="955" x2="620" y2="1018" class="edge" marker-end="url(#arrow)"/>
  <line x1="530" y1="955" x2="660" y2="1018" class="edge" marker-end="url(#arrow)"/>
  <line x1="780" y1="955" x2="740" y2="1018" class="edge" marker-end="url(#arrow)"/>
  <line x1="1030" y1="955" x2="780" y2="1018" class="edge" marker-end="url(#arrow)"/>

  <!-- PHASE 4: VERIFY -->
  <rect x="100" y="1100" width="1200" height="160" rx="8" class="phase-bg"/>
  <text x="130" y="1125" class="phase">PHASE 4 — VERIFY (parallel Opus, read-only)</text>
  <g>
    <rect x="180" y="1145" width="200" height="70" rx="8" fill="#845ef7" stroke="#5f3dc4" stroke-width="2"/>
    <text x="280" y="1170" class="node-text">Verifier lane-1</text>
    <text x="280" y="1188" class="small">Opus · Func>=9 rubric</text>
    <text x="280" y="1204" class="small">contract only, no log</text>

    <rect x="430" y="1145" width="200" height="70" rx="8" fill="#845ef7" stroke="#5f3dc4" stroke-width="2"/>
    <text x="530" y="1170" class="node-text">Verifier lane-2</text>
    <text x="530" y="1188" class="small">Opus · Func>=9 rubric</text>
    <text x="530" y="1204" class="small">contract only, no log</text>

    <rect x="680" y="1145" width="200" height="70" rx="8" fill="#845ef7" stroke="#5f3dc4" stroke-width="2"/>
    <text x="780" y="1170" class="node-text">Verifier lane-3</text>
    <text x="780" y="1188" class="small">Opus · Func>=9 rubric</text>
    <text x="780" y="1204" class="small">contract only, no log</text>

    <rect x="930" y="1145" width="200" height="70" rx="8" fill="#845ef7" stroke="#5f3dc4" stroke-width="2"/>
    <text x="1030" y="1170" class="node-text">Verifier lane-N</text>
    <text x="1030" y="1188" class="small">Opus · Func>=9 rubric</text>
    <text x="1030" y="1204" class="small">contract only, no log</text>
  </g>
  <line x1="620" y1="1072" x2="280" y2="1143" class="edge" marker-end="url(#arrow)"/>
  <line x1="660" y1="1072" x2="530" y2="1143" class="edge" marker-end="url(#arrow)"/>
  <line x1="740" y1="1072" x2="780" y2="1143" class="edge" marker-end="url(#arrow)"/>
  <line x1="780" y1="1072" x2="1030" y2="1143" class="edge" marker-end="url(#arrow)"/>

  <!-- GATE 3: lane-verify -->
  <polygon points="540,1280 860,1280 820,1332 580,1332" fill="#ffa94d" stroke="#d9480f" stroke-width="2"/>
  <text x="700" y="1305" class="node-text-dark">spec_gate.sh lane-verify (per lane)</text>
  <text x="700" y="1321" class="small-dark">Re-runs AC tests, checks verifier JSON verdict=PASS</text>
  <line x1="280" y1="1215" x2="620" y2="1278" class="edge" marker-end="url(#arrow)"/>
  <line x1="530" y1="1215" x2="660" y2="1278" class="edge" marker-end="url(#arrow)"/>
  <line x1="780" y1="1215" x2="740" y2="1278" class="edge" marker-end="url(#arrow)"/>
  <line x1="1030" y1="1215" x2="780" y2="1278" class="edge" marker-end="url(#arrow)"/>

  <!-- GATE 4: sprint-close HARD GATE -->
  <polygon points="490,1370 910,1370 870,1432 530,1432" fill="#ff6b6b" stroke="#c92a2a" stroke-width="4"/>
  <text x="700" y="1398" class="node-text">spec_gate.sh sprint-close</text>
  <text x="700" y="1416" class="small">HARD GATE · PreToolUse hook · non-bypassable</text>
  <line x1="700" y1="1332" x2="700" y2="1368" class="edge-thick" marker-end="url(#arrow)"/>

  <!-- complete_task + Block -->
  <rect x="320" y="1480" width="300" height="50" rx="6" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="470" y="1510" class="node-text-dark">exit 0 → complete_task</text>

  <rect x="780" y="1480" width="360" height="50" rx="6" fill="#212529" stroke="#000" stroke-width="2"/>
  <text x="960" y="1503" class="node-text">exit 1 → BLOCK (decision:block JSON)</text>
  <text x="960" y="1520" class="small">agent cannot call complete_task</text>

  <line x1="630" y1="1432" x2="470" y2="1478" class="edge" marker-end="url(#arrow)"/>
  <line x1="770" y1="1432" x2="960" y2="1478" class="edge-thick" marker-end="url(#arrow)"/>

  <!-- gate.log audit trail (dashed, side annotation) -->
  <rect x="1160" y="800" width="220" height="60" rx="4" fill="#f1f3f5" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="1270" y="822" class="node-text-dark">gate.log</text>
  <text x="1270" y="840" class="small-dark">append-only audit</text>
  <text x="1270" y="854" class="small-dark">per sprint</text>
  <path d="M 860 715 Q 1100 760 1200 800" class="edge-dash" marker-end="url(#arrowDash)"/>
  <path d="M 860 1045 Q 1100 950 1200 860" class="edge-dash" marker-end="url(#arrowDash)"/>
  <path d="M 860 1305 Q 1100 1100 1200 860" class="edge-dash" marker-end="url(#arrowDash)"/>
  <path d="M 860 1400 Q 1100 1150 1200 860" class="edge-dash" marker-end="url(#arrowDash)"/>

  <!-- Legend -->
  <g transform="translate(100,1560)">
    <rect x="0" y="0" width="18" height="14" fill="#4dabf7" stroke="#1864ab"/>
    <text x="24" y="12" class="small-dark">Sonnet 4.6 (explorer/executor)</text>
    <rect x="230" y="0" width="18" height="14" fill="#845ef7" stroke="#5f3dc4"/>
    <text x="254" y="12" class="small-dark">Opus (planner/verifier)</text>
    <polygon points="420,0 458,0 454,14 424,14" fill="#ffa94d" stroke="#d9480f"/>
    <text x="464" y="12" class="small-dark">spec_gate.sh check</text>
    <polygon points="620,0 672,0 666,14 626,14" fill="#ff6b6b" stroke="#c92a2a" stroke-width="2"/>
    <text x="680" y="12" class="small-dark">HARD GATE (non-bypassable)</text>
    <line x1="900" y1="7" x2="930" y2="7" class="edge-dash" marker-end="url(#arrowDash)"/>
    <text x="936" y="12" class="small-dark">audit trail</text>
  </g>
</svg>
